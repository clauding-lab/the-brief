<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE BRIEF — Bangladesh Business Intelligence</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Brief" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2329;
      --border2:   #2a3040;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #3b82f6;
      --accent2:   #1d4ed8;
      --bull:      #22c55e;
      --bear:      #ef4444;
      --warn:      #f59e0b;
      --neutral:   #94a3b8;
      --tag-bg:    #1e2329;
      --pill-bear: rgba(239,68,68,0.12);
      --pill-bull: rgba(34,197,94,0.12);
      --pill-warn: rgba(245,158,11,0.12);
      --pill-neu:  rgba(148,163,184,0.1);
      --brand-color: #ffffff;
    }

    :root.light {
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --border2:   #cbd5e1;
      --text:      #1e293b;
      --muted:     #64748b;
      --accent:    #2563eb;
      --accent2:   #1d4ed8;
      --bull:      #16a34a;
      --bear:      #dc2626;
      --warn:      #d97706;
      --neutral:   #475569;
      --tag-bg:    #f1f5f9;
      --pill-bear: rgba(220,38,38,0.08);
      --pill-bull: rgba(22,163,74,0.08);
      --pill-warn: rgba(217,119,6,0.08);
      --pill-neu:  rgba(71,85,105,0.08);
      --brand-color: #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {}
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--brand-color);
      text-transform: uppercase;
    }
    .brand span { color: var(--accent); }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right {
      text-align: right;
    }
    .date-stamp {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--bull);
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      margin-top: 5px;
    }
    .live-dot {
      width: 5px; height: 5px;
      background: var(--bull);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Nav Bar ── */
    .nav {
      display: flex;
      gap: 2px;
      padding: 0 32px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      z-index: 99;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main layout ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 32px;
      padding-top: 68px;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-num {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      background: var(--tag-bg);
      padding: 2px 7px;
      border-radius: 2px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .section-icon {
      font-size: 14px;
      margin-left: auto;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .cards-grid-3 {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      position: relative;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border2); }

    .card-accent-bull { border-left: 3px solid var(--bull); }
    .card-accent-bear { border-left: 3px solid var(--bear); }
    .card-accent-warn { border-left: 3px solid var(--warn); }
    .card-accent-neu  { border-left: 3px solid var(--neutral); }
    .card-accent-blue { border-left: 3px solid var(--accent); }

    .card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-color);
      line-height: 1.2;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .15s, background .15s, border-color .15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border2); }

    /* ── Subscribe button ── */
    .subscribe-btn {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 3px 10px;
      border-radius: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
      transition: background .15s, border-color .15s;
    }
    .subscribe-btn:hover { background: rgba(59,130,246,0.2); border-color: var(--accent); }

    /* ── Subscribe modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      width: 340px;
      padding: 24px 24px 20px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none; border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      border-radius: 2px;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 4px;
    }
    .modal-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }
    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-label .req { color: var(--accent); margin-left: 2px; }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 2px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); opacity: 0.55; }
    .submit-btn {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .submit-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; opacity: 0.55; }
    .submit-btn:not(:disabled):hover { background: var(--accent2); }

    .card-value-sm { font-size: 18px; }

    .card-change {
      font-size: 11px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .bull { color: var(--bull); }
    .bear { color: var(--bear); }
    .warn { color: var(--warn); }
    .neu  { color: var(--neutral); }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Pill tags ── */
    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 600;
    }
    .pill-bull { background: var(--pill-bull); color: var(--bull); border: 1px solid rgba(34,197,94,0.25); }
    .pill-bear { background: var(--pill-bear); color: var(--bear); border: 1px solid rgba(239,68,68,0.25); }
    .pill-warn { background: var(--pill-warn); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
    .pill-neu  { background: var(--pill-neu);  color: var(--neutral); border: 1px solid rgba(148,163,184,0.2); }
    .pill-blue { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.25); }

    /* ── News items ── */
    .news-list { display: flex; flex-direction: column; gap: 8px; }
    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .news-item:hover { border-color: var(--border2); }
    .news-bullet {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .news-content {}
    .news-headline {
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }
    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .news-source {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .news-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .news-source a:hover { text-decoration: underline; }
    .news-time {
      font-size: 9px;
      color: var(--muted);
    }

    /* ── Ticker strip ── */
    .ticker-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .ticker-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ticker-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .ticker-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .ticker-chg { font-size: 10px; }

    /* ── Table ── */
    .brief-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .brief-table th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      background: var(--surface);
    }
    .brief-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .brief-table tr:last-child td { border-bottom: none; }
    .brief-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── Two-col layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px; }
      .header { padding: 16px; }
      .nav { padding: 0 16px; }
    }

    /* ── Context box ── */
    .context-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }
    .context-box strong { color: var(--text); }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--text);
      opacity: 0.6;
      letter-spacing: 0.08em;
    }
    .footer a {
      color: var(--text);
      text-decoration: none;
    }
    .footer a:hover { color: var(--accent); opacity: 1; }
    @media (max-width: 768px) {
      .footer {
        flex-direction: column;
        gap: 6px;
        text-align: center;
        padding: 16px 20px calc(80px + env(safe-area-inset-bottom, 0px));
      }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Signal bar ── */
    .signal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .signal-label { font-size: 10px; color: var(--muted); min-width: 80px; }
    .signal-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .signal-bar-fill { height: 100%; border-radius: 2px; }
    .signal-val { font-size: 10px; font-weight: 700; min-width: 50px; text-align: right; }

    /* ── Impact notice ── */
    .impact-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .impact-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
    .impact-text { font-size: 11px; color: var(--warn); line-height: 1.6; }
    .impact-text strong { color: #fff; }
    :root.light .impact-text strong { color: var(--text); }

    /* ── Sub-section heading ── */
    .sub-head {
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 14px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Section scroll target ── */
    .scroll-target { scroll-margin-top: 100px; }

    /* ── Time stamp ── */
    .ts {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ════════════════════════════════════════
       NEW ENHANCEMENTS — added Mar 2026
    ════════════════════════════════════════ */

    /* ── Traffic Light ── */
    .traffic-light {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
    }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-dot.bull  { background: var(--bull); box-shadow: 0 0 5px var(--bull); }
    .tl-dot.bear  { background: var(--bear); box-shadow: 0 0 5px var(--bear); }
    .tl-dot.warn  { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
    .tl-dot.neu   { background: var(--neutral); }
    .tl-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Fresh Tag ── */
    .fresh-tag {
      display: inline-block;
      font-size: 8.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--tag-bg);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Sparkline ── */
    .sparkline-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .sparkline-label {
      font-size: 8.5px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Collapsible News ── */
    .collapsible-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 0 4px;
      transition: color .2s;
      width: 100%;
    }
    .collapsible-toggle:hover { color: var(--accent); }
    .collapsible-toggle-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Cross-Section Insight ── */
    .cross-insight {
      margin-top: 14px;
      padding: 10px 14px;
      border-left: 3px solid var(--warn);
      background: rgba(245,158,11,0.05);
      border-radius: 0 4px 4px 0;
      font-size: 11.5px;
      color: var(--text);
      font-style: italic;
      line-height: 1.6;
    }
    .cross-insight strong { font-style: normal; color: var(--warn); }

    /* ── Executive Summary ── */
    /* ── Banker's Read ───────────────────────────────────────────────────── */
    .banker-read {
      margin-top: 18px;
      padding: 13px 16px 13px 14px;
      background: rgba(67, 97, 238, 0.05);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .banker-read-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.13em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .banker-read-text {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.65;
      opacity: 0.88;
    }
    :root.light .banker-read {
      background: rgba(37, 99, 235, 0.04);
    }

    .exec-bullets {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .exec-bullet {
      display: flex;

function Sparkline({ data, color }) {
  const w = 80, h = 24, pad = 2;
  const vals = data.map(Number);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <div className="sparkline-wrap">
      <svg width={w} height={h} style={{ overflow: "visible" }}>
        <polyline points={pts} fill="none" stroke={color || "var(--accent)"} strokeWidth="1.5"
          strokeLinejoin="round" strokeLinecap="round" />
        <circle cx={pts.split(" ").slice(-1)[0].split(",")[0]}
                cy={pts.split(" ").slice(-1)[0].split(",")[1]}
                r="2.5" fill={color || "var(--accent)"} />
      </svg>
    </div>
  );
}

// ── Oil Chart ────────────────────────────────────────────────────────────────

function OilChart() {
  const { useState, useEffect } = React;

  const AV_KEY = "T294W0RCT1U6OOPE";

  const STATIC_DATA = [
    { label: "Oct '25",   value: 63.2 },
    { label: "Jan '26",   value: 62 },
    { label: "Jan 30",    value: 72 },
    { label: "Mid-Feb",   value: 77 },
    { label: "Feb 28",    value: 69,  event: true },
    { label: "Mar 2",     value: 82 },
    { label: "Mar 4",     value: 82.8 },
    { label: "Mar 6",     value: 92.69 },
    { label: "Mar 7",     value: 92.69 },
    { label: "Mar 8",     value: 92.69, today: true },
  ];

  
  
  
  const [data, setData]     = useState(STATIC_DATA);
  const [isLive, setIsLive] = useState(false);

  useEffect(() => {
    fetch(`https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${AV_KEY}`)
      .then(r => r.json())
      .then(json => {
        if (!json.data || json.data.length === 0) return;
        // Take only the most recent valid price — update the last data point live
        // Chart structure stays locked to STATIC_DATA; only the current price refreshes
        const latest = json.data.find(d => parseFloat(d.value) > 0);
        if (!latest) return;
        const liveVal = parseFloat(latest.value);
        // Guard: AV free tier has 1-3 day lag — reject stale data if it
        // deviates more than 15% below the static value (e.g. post-spike events)
        const staticVal = STATIC_DATA[STATIC_DATA.length - 1].value;
        if (liveVal < staticVal * 0.85) return;
        setData(prev => {
          const updated = [...prev];
          updated[updated.length - 1] = { ...updated[updated.length - 1], value: liveVal };
          return updated;
        });
        setIsLive(true);
      })
      .catch(() => {});
  }, []);

  const W = 720, H = 270;
  const pad = { top: 46, right: 58, bottom: 68, left: 54 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;

  const vals   = data.map(d => d.value);
  const minV   = Math.floor((Math.min(...vals) - 5) / 5) * 5;
  const maxV   = Math.ceil ((Math.max(...vals) + 5) / 5) * 5;

  const cx = i => pad.left + (i / (data.length - 1)) * iW;
  const cy = v => pad.top  + ((maxV - v) / (maxV - minV)) * iH;

  const linePoints = data.map((d, i) => `${cx(i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ");
  const areaPoints = `${cx(0).toFixed(1)},${(H-pad.bottom).toFixed(1)} ${linePoints} ${cx(data.length-1).toFixed(1)},${(H-pad.bottom).toFixed(1)}`;

  const gridVals = [];
  for (let v = minV + 5; v < maxV; v += 5) gridVals.push(v);

  const eIdx    = Math.max(0, data.findIndex(d => d.event) === -1 ? Math.floor(data.length * 0.7) : data.findIndex(d => d.event));
  const lastIdx = data.length - 1;
  const lastVal = data[lastIdx].value;

  return (
    <div style={{ marginTop: 20 }}>
      <div className="sub-head" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>📈 Brent Crude Oil Price — USD/bbl (Last 6 Months)</span>
        {isLive && <span style={{ fontSize: 8, fontWeight: 700, color: "var(--bull)", background: "rgba(34,197,94,0.12)", border: "1px solid var(--bull)", borderRadius: 3, padding: "1px 6px", letterSpacing: "0.08em" }}>● LIVE</span>}
      </div>
      <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 4, padding: "12px 0 0" }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>

          <text x={0} y={0} fill="var(--muted)" fontSize="9.5" textAnchor="middle"
            transform={`translate(13,${(pad.top + (H - pad.bottom)) / 2}) rotate(-90)`}>
            USD / bbl
          </text>

          {gridVals.map(v => (
            <g key={v}>
              <line x1={pad.left} y1={cy(v)} x2={W - pad.right} y2={cy(v)}
                stroke="var(--border)" strokeWidth="1" strokeDasharray={v === 80 ? "4,0" : "3,3"} />
              <text x={pad.left - 6} y={cy(v) + 4} fill="var(--muted)" fontSize="10" textAnchor="end">${v}</text>
            </g>
          ))}

          <polygon points={areaPoints} fill="rgba(239,68,68,0.07)" />

          <polyline
            points={data.slice(0, eIdx + 1).map((d, i) => `${cx(i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ")}
            fill="none" stroke="var(--neutral)" strokeWidth="2" strokeLinejoin="round" />

          <polyline
            points={data.slice(eIdx).map((d, i) => `${cx(eIdx + i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ")}
            fill="none" stroke="var(--bear)" strokeWidth="2.5" strokeLinejoin="round" />

          {(() => {
            const annW = 128, annH = 20;
            // Clamp box so it never overflows left or right of the chart area
            const rawX  = cx(eIdx) - annW / 2;
            const annX  = Math.max(pad.left, Math.min(rawX, W - pad.right - annW));
            const textX = annX + annW / 2;
            return (
              <g>
                <line x1={cx(eIdx)} y1={pad.top + 22} x2={cx(eIdx)} y2={cy(data[eIdx].value) - 6}
                  stroke="var(--warn)" strokeWidth="1" strokeDasharray="4,2" />
                <rect x={annX} y={pad.top - 2} width={annW} height={annH} rx={3}
                  fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" strokeWidth="1" />
                <text x={textX} y={pad.top + 13} fill="var(--warn)" fontSize="9.5" textAnchor="middle" fontWeight="700">
                  OP. EPIC FURY — FEB 28
                </text>
              </g>
            );
          })()}

          {data.map((d, i) => {
            if (i === lastIdx) return null;
            if (i === eIdx) return <circle key={i} cx={cx(i)} cy={cy(d.value)} r={5}   fill="var(--warn)"    stroke="var(--surface)" strokeWidth="1.5" />;
            return             <circle key={i} cx={cx(i)} cy={cy(d.value)} r={3}   fill="var(--neutral)" stroke="var(--surface)" strokeWidth="1.5" />;
          })}

          <circle cx={cx(lastIdx)} cy={cy(lastVal)} r={5.5} fill="var(--bear)" stroke="var(--surface)" strokeWidth="1.5" />
          <text x={cx(lastIdx) + 7} y={cy(lastVal) - 8} fill="var(--bear)" fontSize="11" textAnchor="start" fontWeight="700">${Math.round(lastVal)}</text>
          <text x={cx(lastIdx) + 7} y={cy(lastVal) + 4} fill="var(--bear)" fontSize="9"  textAnchor="start">{isLive ? "LIVE" : "TODAY"}</text>

          {data.map((d, i) => (
            <text key={i} x={0} y={0}
              fill={d.event || d.today ? "var(--warn)" : "var(--muted)"}
              fontSize="9.5" textAnchor="end"
              fontWeight={d.event || d.today ? "700" : "400"}
              transform={`translate(${cx(i).toFixed(1)},${(H - pad.bottom + 14).toFixed(1)}) rotate(-38)`}>
              {d.label}
            </text>
          ))}

          <line x1={pad.left} y1={pad.top}       x2={pad.left}       y2={H - pad.bottom} stroke="var(--border2)" strokeWidth="1" />
          <line x1={pad.left} y1={H - pad.bottom} x2={W - pad.right} y2={H - pad.bottom} stroke="var(--border2)" strokeWidth="1" />
        </svg>

        <div style={{ display: "flex", flexWrap: "wrap", gap: "12px 20px", padding: "4px 16px 12px", fontSize: 10, color: "var(--muted)", alignItems: "center" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ display: "inline-block", width: 20, height: 2, background: "var(--neutral)", borderRadius: 1 }} />
            Pre-conflict trend
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ display: "inline-block", width: 20, height: 2, background: "var(--bear)", borderRadius: 1 }} />
            Post Op. Epic Fury (Feb 28)
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ display: "inline-block", width: 9, height: 9, borderRadius: "50%", background: "var(--warn)" }} />
            Op. Epic Fury trigger point
          </span>
          <span style={{ marginLeft: "auto" }}>Source: {isLive ? "Alpha Vantage · live data" : "TradingEconomics · EIA · Bloomberg · Reuters"}</span>
        </div>
      </div>
    </div>
  );
}

      <div className="cards-grid" style={{ marginBottom: 16 }}>

      <div className="rmg-market-bars" style={{ marginTop: 8 }}>
        {[
          { country: "Gas", pct: 55, color: "var(--accent)" },
          { country: "Coal", pct: 22, color: "var(--muted)" },

      <CollapsibleNews defaultShow={2} items={[
        { sentiment: "bear", headline: "Load shedding persists across Bangladesh — 2,600 MW daily shortage as gas supply and LNG imports constrained", detail: "Petromax and Sunflower power plants offline due to gas shortage. Rural feeders experiencing 3–4 hr daily outages; urban Dhaka 1–2 hrs. BPDB projecting higher shortage in summer (Apr–Jun) as AC demand surges. Government emergency LNG procurement underway.", source: "BPDB / TBS News", time: "Mar 2026" },
        { sentiment: "warn", headline: "Iran war driving up LNG spot prices — Bangladesh exposed via 40% spot procurement ratio", detail: "Iran-driven LNG supply disruption pushing spot prices to $13.5–14/MMBtu. Bangladesh pays spot for ~40% of its LNG requirements. Each $1/MMBtu increase costs approximately $80–100M/year in additional import costs. Hormutz Strait risk premium persisting.", source: "Petrobangla / Bloomberg", time: "Mar 2026" },
        { sentiment: "neu", headline: "Bangladesh targets 40% renewable energy by 2041 — current share: ~4% of generation mix", detail: "Government renewable energy roadmap calls for 40,000 MW of renewable capacity by 2041, including 17,000 MW solar, 11,000 MW wind, 2,000 MW nuclear (Rooppur Unit 2). Current installed renewables: ~1,150 MW. Pace of capacity addition severely lagging targets.", source: "SREDA / Power Division", time: "2025" },

      <BankerRead text="2,600 MW daily shortage with 3-4 hours rural load shedding is a direct productivity hit for the SME manufacturing base — especially for RMG units outside EPZs and light engineering clusters in the Dhaka periphery. For SME credit officers doing site visits, generator fuel cost and backup power arrangements are now a material opex variable that can tip a marginal borrower into non-performance; it should be a standard line item in the next credit review. LNG at $12-14/MMBtu is a structural cost that will not normalise quickly, and BPDB's capacity payment obligations suggest the fiscal-banking feedback loop (subsidy spending → government borrowing → crowding out) will intensify." />
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [activeSection, setActiveSection] = useState("bb");
  const [dark, setDark] = useState(false);

  // ── Subscribe modal state ─────────────────────────────────────────────────
  const [showSubscribe, setShowSubscribe] = useState(false);
  const [subName,       setSubName]       = useState("");
  const [subOrg,        setSubOrg]        = useState("");
  const [subEmail,      setSubEmail]      = useState("");
  const [subSubmitted,  setSubSubmitted]  = useState(false);
  const [subLoading,    setSubLoading]    = useState(false);
  const [subError,      setSubError]      = useState("");
  const canSubmit = subName.trim().length > 0 && subEmail.trim().length > 0 && !subLoading;

  async function handleSubscribe(e) {
    e.preventDefault();
    setSubLoading(true);
    setSubError("");
    const { error } = await _sb.from("subscribers").insert({
      name:         subName.trim(),
      organisation: subOrg.trim() || null,
      email:        subEmail.trim().toLowerCase(),
    });
    setSubLoading(false);
    if (error) {
      // 23505 = unique_violation (duplicate email) — show success anyway
      if (error.code === "23505") { setSubSubmitted(true); return; }
      setSubError("Something went wrong. Please try again.");
      return;
    }
    setSubSubmitted(true);
  }

  function closeModal() {
    setShowSubscribe(false);
    if (subSubmitted) {
      setSubName(""); setSubOrg(""); setSubEmail(""); setSubSubmitted(false);
    }
    setSubError("");
  }

  // ── Custom bottom-nav slots (persisted in localStorage) ───────────────────
  const [customSlots, setCustomSlots] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("tb-custom-slots")) || ["remit","iranwar"]; }
    catch { return ["remit","iranwar"]; }
  });
  const [editingSlot, setEditingSlot] = React.useState(null); // 0 or 1
  const lpTimer = React.useRef(null);

  const NAV_ICON = {
    exec:"📋", bb:"🏦", macro:"📊", dse:"📈", tbond:"📜", comm:"🌾", dam:"🛒",
    fx:"💱", remit:"💸", banking:"🏛️", tariff:"🇺🇸", trade:"🚢",
    iranwar:"🛢️", rmg:"👕", fiscal:"💰", nbr:"🧾", power:"⚡", peers:"🌏"
  };

  function startLP(idx) {
    lpTimer.current = setTimeout(() => setEditingSlot(idx), 500);
  }
  function cancelLP() { clearTimeout(lpTimer.current); }

  function pickSlot(sectionId) {
    const next = [...customSlots];
    next[editingSlot] = sectionId;
    setCustomSlots(next);
    try { localStorage.setItem("tb-custom-slots", JSON.stringify(next)); } catch {}
    setEditingSlot(null);
  }

  useEffect(() => {
    document.documentElement.classList.toggle("light", !dark);
  }, [dark]);

  // Dynamically position fixed nav below the actual header height
  useEffect(() => {
    function positionNav() {
      const hdr = document.querySelector('.header');
      const nav = document.querySelector('.nav');
      const main = document.querySelector('.main');
      if (!hdr || !nav || !main) return;
      const hh = hdr.offsetHeight;
      const nh = nav.offsetHeight;
      nav.style.top = hh + 'px';
      main.style.paddingTop = (hh + nh + 4) + 'px';
    }
    positionNav();
    window.addEventListener('resize', positionNav);
    return () => window.removeEventListener('resize', positionNav);
  }, []);

  function scrollTo(id) {
    setActiveSection(id);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  }

  // Track scroll position to update active nav
  useEffect(() => {
    function onScroll() {
      const ids = SECTIONS.map(s => s.id);
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 140) {
          setActiveSection(ids[i]);
          return;
        }
      }
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div>
      {/* Header */}
      <header className="header">
        <div className="header-left">
          <div className="brand">THE <span>BRIEF</span></div>
          <div className="tagline">Bangladesh Business Intelligence</div>
        </div>
        <div className="header-right">
          <div className="date-stamp">{BRIEF_DATE}</div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, marginTop: 6 }}>
            <button className="subscribe-btn" onClick={() => setShowSubscribe(true)}>
              ✉ Subscribe
            </button>
            <button className="theme-toggle" onClick={() => setDark(d => !d)}>
              {dark ? "☀ Light" : "☾ Dark"}
            </button>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav className="nav">
        {SECTIONS.map(s => (
          <button
            key={s.id}
            className={`nav-btn ${activeSection === s.id ? "active" : ""}`}
            onClick={() => scrollTo(s.id)}
          >
            {s.label}
          </button>
        ))}
      </nav>

      {/* Body */}
      <main className="main">
        <SectionExec />
        <hr className="divider" />
        <SectionBB />
        <hr className="divider" />
        <SectionMacro />
        <hr className="divider" />
        <SectionDSE />
        <hr className="divider" />
        <SectionTBond />
        <hr className="divider" />
        <SectionComm />
        <hr className="divider" />
        <SectionDAM />
        <hr className="divider" />
        <SectionFX />
        <hr className="divider" />
        <SectionRemittance />
        <hr className="divider" />
        <SectionBanking />
        <hr className="divider" />
        <SectionTariff />
        <hr className="divider" />
        <SectionTrade />
        <hr className="divider" />
        <SectionIranWar />
        <hr className="divider" />
        <SectionRMG />
        <hr className="divider" />
        <SectionFiscal />
        <hr className="divider" />
        <SectionNBR />
        <hr className="divider" />
        <SectionPower />
        <hr className="divider" />
        <SectionPeers />
      </main>

      {/* Mobile Bottom Nav */}
      <nav className="bottom-nav">
        {/* Fixed left 3 */}
        {[
          { id: "exec",    icon: "📋", label: "Summary" },
          { id: "dse",     icon: "📈", label: "DSE" },
          { id: "iranwar", icon: "🛢️", label: "Iran/Oil" },
        ].map(s => (
          <button key={s.id}
            className={`bottom-nav-btn ${activeSection === s.id ? "active" : ""}`}
            onClick={() => scrollTo(s.id)}>
            <span className="bottom-nav-icon">{s.icon}</span>
            {s.label}
          </button>
        ))}
        {/* Customisable right 2 — long-press to change */}
        {customSlots.map((sid, idx) => {
          const sec = SECTIONS.find(s => s.id === sid);
          if (!sec) return null;
          return (
            <button key={idx}
              className={`bottom-nav-btn customizable ${activeSection === sid ? "active" : ""}`}
              onClick={() => scrollTo(sid)}
              onPointerDown={() => startLP(idx)}
              onPointerUp={cancelLP}
              onPointerLeave={cancelLP}
              onContextMenu={e => { e.preventDefault(); setEditingSlot(idx); }}>
              <span className="bottom-nav-icon">{NAV_ICON[sid] || "📌"}</span>
              <span className="bottom-nav-edit-dot">✏️</span>
              {sec.short}
            </button>
          );
        })}
      </nav>

      {/* Slot picker sheet */}
      {editingSlot !== null && (
        <div className="slot-picker">
          <div className="slot-picker-header">
            <span>Choose shortcut {editingSlot + 4}</span>
            <button className="slot-picker-close" onClick={() => setEditingSlot(null)}>✕</button>
          </div>
          <div className="slot-picker-grid">
            {SECTIONS
              .filter(s => !["exec","dse","iranwar"].includes(s.id))
              .map(s => (
                <button key={s.id}
                  className={`slot-picker-btn ${customSlots[editingSlot] === s.id ? "selected" : ""}`}
                  onClick={() => pickSlot(s.id)}>
                  <span className="slot-picker-btn-icon">{NAV_ICON[s.id] || "📌"}</span>
                  {s.short}
                </button>
              ))
            }
          </div>
        </div>
      )}

      {/* Footer */}
      <footer className="footer">
        <div>
          <span>Sources: </span>
          {[
            ["The Daily Star", "https://www.thedailystar.net"],
            ["TBS News", "https://www.tbsnews.net"],
            ["Financial Express BD", "https://today.thefinancialexpress.com.bd"],
            ["Bangladesh Bank", "https://www.bb.org.bd"],
            ["Trading Economics", "https://tradingeconomics.com/bangladesh"],
            ["Al Jazeera", "https://www.aljazeera.com"],
            ["The Diplomat", "https://thediplomat.com"],
          ].map(([name, url], i) => (
            <span key={i}>
              {i > 0 && " · "}
              <a href={url} target="_blank" rel="noreferrer">{name}</a>
            </span>
          ))}
        </div>
        <div>THE BRIEF · Bangladesh · {new Date().getFullYear()}</div>
      </footer>

      {/* Subscribe modal */}
      {showSubscribe && (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) closeModal(); }}>
          <div className="modal-card">
            <button className="modal-close" onClick={closeModal}>×</button>

            {subSubmitted ? (
              <div style={{ textAlign: "center", padding: "16px 0 8px" }}>
                <div style={{ fontSize: 32, color: "var(--bull)", marginBottom: 10 }}>✓</div>
                <div className="modal-title">You're on the list</div>
                <div className="modal-sub" style={{ marginTop: 6, marginBottom: 0 }}>
                  We'll send THE BRIEF to {subEmail} every morning.
                </div>
              </div>
            ) : (
              <>
                <div className="modal-title">Subscribe to THE BRIEF</div>
                <div className="modal-sub">Daily Bangladesh business intelligence, delivered to your inbox.</div>
                <form onSubmit={handleSubscribe}>
                  <div className="form-group">
                    <label className="form-label">Name <span className="req">*</span></label>
                    <input className="form-input" type="text" placeholder="Your name"
                      value={subName} onChange={e => setSubName(e.target.value)} autoFocus />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Organisation</label>
                    <input className="form-input" type="text" placeholder="Company / institution (optional)"
                      value={subOrg} onChange={e => setSubOrg(e.target.value)} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Email Address <span className="req">*</span></label>
                    <input className="form-input" type="email" placeholder="you@example.com"
                      value={subEmail} onChange={e => setSubEmail(e.target.value)} />
                  </div>
                  <button className="submit-btn" type="submit" disabled={!canSubmit}>
                    {subLoading ? "Sending…" : "Subscribe →"}
                  </button>
                  {subError && (
                    <div style={{ color: "var(--bear)", fontSize: 10, letterSpacing: "0.05em", marginTop: 8, textAlign: "center" }}>
                      {subError}
                    </div>
                  )}
                </form>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

    });
  }
