<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE BRIEF — Bangladesh Business Intelligence</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2329;
      --border2:   #2a3040;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #3b82f6;
      --accent2:   #1d4ed8;
      --bull:      #22c55e;
      --bear:      #ef4444;
      --warn:      #f59e0b;
      --neutral:   #94a3b8;
      --tag-bg:    #1e2329;
      --pill-bear: rgba(239,68,68,0.12);
      --pill-bull: rgba(34,197,94,0.12);
      --pill-warn: rgba(245,158,11,0.12);
      --pill-neu:  rgba(148,163,184,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {}
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #fff;
      text-transform: uppercase;
    }
    .brand span { color: var(--accent); }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right {
      text-align: right;
    }
    .date-stamp {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--bull);
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      margin-top: 5px;
    }
    .live-dot {
      width: 5px; height: 5px;
      background: var(--bull);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Nav Bar ── */
    .nav {
      display: flex;
      gap: 2px;
      padding: 0 32px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main layout ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-num {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      background: var(--tag-bg);
      padding: 2px 7px;
      border-radius: 2px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .section-icon {
      font-size: 14px;
      margin-left: auto;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .cards-grid-3 {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      position: relative;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border2); }

    .card-accent-bull { border-left: 3px solid var(--bull); }
    .card-accent-bear { border-left: 3px solid var(--bear); }
    .card-accent-warn { border-left: 3px solid var(--warn); }
    .card-accent-neu  { border-left: 3px solid var(--neutral); }
    .card-accent-blue { border-left: 3px solid var(--accent); }

    .card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .card-value-sm { font-size: 18px; }

    .card-change {
      font-size: 11px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .bull { color: var(--bull); }
    .bear { color: var(--bear); }
    .warn { color: var(--warn); }
    .neu  { color: var(--neutral); }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Pill tags ── */
    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 600;
    }
    .pill-bull { background: var(--pill-bull); color: var(--bull); border: 1px solid rgba(34,197,94,0.25); }
    .pill-bear { background: var(--pill-bear); color: var(--bear); border: 1px solid rgba(239,68,68,0.25); }
    .pill-warn { background: var(--pill-warn); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
    .pill-neu  { background: var(--pill-neu);  color: var(--neutral); border: 1px solid rgba(148,163,184,0.2); }
    .pill-blue { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.25); }

    /* ── News items ── */
    .news-list { display: flex; flex-direction: column; gap: 8px; }
    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .news-item:hover { border-color: var(--border2); }
    .news-bullet {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .news-content {}
    .news-headline {
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }
    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .news-source {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .news-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .news-source a:hover { text-decoration: underline; }
    .news-time {
      font-size: 9px;
      color: var(--muted);
    }

    /* ── Ticker strip ── */
    .ticker-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .ticker-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ticker-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .ticker-val {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }
    .ticker-chg { font-size: 10px; }

    /* ── Table ── */
    .brief-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .brief-table th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      background: var(--surface);
    }
    .brief-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .brief-table tr:last-child td { border-bottom: none; }
    .brief-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── Two-col layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px; }
      .header { padding: 16px; }
      .nav { padding: 0 16px; }
    }

    /* ── Context box ── */
    .context-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }
    .context-box strong { color: var(--text); }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
    }
    .footer a:hover { color: var(--accent); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Signal bar ── */
    .signal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .signal-label { font-size: 10px; color: var(--muted); min-width: 80px; }
    .signal-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .signal-bar-fill { height: 100%; border-radius: 2px; }
    .signal-val { font-size: 10px; font-weight: 700; min-width: 50px; text-align: right; }

    /* ── Impact notice ── */
    .impact-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .impact-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
    .impact-text { font-size: 11px; color: var(--warn); line-height: 1.6; }
    .impact-text strong { color: #fff; }

    /* ── Section scroll target ── */
    .scroll-target { scroll-margin-top: 100px; }

    /* ── Time stamp ── */
    .ts {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Data ────────────────────────────────────────────────────────────────────

const BRIEF_DATE = "FRIDAY 06 MARCH 2026 · 0700 BDT";
const BRIEF_EDITION = "VOL. 1 · ISSUE 64";

const SECTIONS = [
  { id: "bb",     label: "BB & Finance",   short: "BB" },
  { id: "macro",  label: "Macro",          short: "Macro" },
  { id: "dse",    label: "DSE",            short: "DSE" },
  { id: "tbond",  label: "T-Bills/Bonds",  short: "T-Bills" },
  { id: "comm",   label: "Commodities",    short: "Commod" },
  { id: "fx",     label: "FX / Reserves",  short: "FX" },
  { id: "tariff", label: "US Tariffs",     short: "Tariff" },
  { id: "trade",  label: "Int'l Trade",    short: "Trade" },
];

// ── Components ───────────────────────────────────────────────────────────────

function Pill({ type, children }) {
  return <span className={`pill pill-${type}`}>{children}</span>;
}

function SentDot({ type }) {
  const colors = { bull: "var(--bull)", bear: "var(--bear)", warn: "var(--warn)", neu: "var(--neutral)" };
  return (
    <span style={{
      display: "inline-block",
      width: 8, height: 8,
      borderRadius: "50%",
      background: colors[type] || colors.neu,
      flexShrink: 0
    }} />
  );
}

function MetricCard({ label, value, valueSm, change, changeType, sub, accent, pill, pillType }) {
  return (
    <div className={`card card-accent-${accent || "neu"}`}>
      <div className="card-label">{label}</div>
      <div className={`card-value ${valueSm ? "card-value-sm" : ""}`}>{value}</div>
      {change && (
        <div className={`card-change ${changeType || ""}`}>
          {change}
        </div>
      )}
      {pill && <div style={{ marginTop: 6 }}><Pill type={pillType || "neu"}>{pill}</Pill></div>}
      {sub && <div className="card-sub">{sub}</div>}
    </div>
  );
}

function NewsItem({ headline, source, sourceUrl, time, sentiment, detail }) {
  return (
    <div className="news-item">
      <div className="news-bullet" style={{
        background: sentiment === "bull" ? "var(--bull)"
          : sentiment === "bear" ? "var(--bear)"
          : sentiment === "warn" ? "var(--warn)"
          : "var(--neutral)"
      }} />
      <div className="news-content">
        <div className="news-headline">{headline}</div>
        {detail && <div className="card-sub" style={{ marginTop: 4 }}>{detail}</div>}
        <div className="news-meta">
          <span className="news-source">
            {sourceUrl
              ? <a href={sourceUrl} target="_blank" rel="noreferrer">{source}</a>
              : source}
          </span>
          {time && <span className="news-time">{time}</span>}
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ num, title, icon }) {
  return (
    <div className="section-header">
      <span className="section-num">{num}</span>
      <span className="section-title">{title}</span>
      {icon && <span className="section-icon">{icon}</span>}
    </div>
  );
}

function TickerStrip({ items }) {
  return (
    <div className="ticker-row">
      {items.map((t, i) => (
        <div key={i} className="ticker-chip">
          <span className="ticker-name">{t.name}</span>
          <span className="ticker-val">{t.value}</span>
          {t.change && (
            <span className={`ticker-chg ${t.chgType || "neu"}`}>{t.change}</span>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Sections ─────────────────────────────────────────────────────────────────

function SectionBB() {
  return (
    <div className="section scroll-target" id="bb">
      <SectionHeader num="01" title="Bangladesh Bank & Financial Sector" icon="🏦" />

      <TickerStrip items={[
        { name: "Policy Rate", value: "10.00%", change: "HOLD", chgType: "warn" },
        { name: "Repo", value: "10.00%", change: "Unchanged", chgType: "neu" },
        { name: "SDF Rate", value: "7.50%", change: "▼ −50bps", chgType: "bull" },
        { name: "Inflation (Jan)", value: "8.58%", change: "▲ +0.09pp", chgType: "bear" },
        { name: "Pvt Credit Growth", value: "6.1%", change: "vs 8% target", chgType: "bear" },
      ]} />

      <div className="impact-banner">
        <span className="impact-icon">⚑</span>
        <div className="impact-text">
          <strong>Monetary Policy Stance (H2 FY26):</strong> Bangladesh Bank holds the policy rate at <strong>10%</strong> for the second half of FY2025-26, announced 9 February 2026. The SDF rate was cut 50bps to 7.5% to discourage excess liquidity parking at BB and push credit into the private sector.
        </div>
      </div>

      <div className="news-list">
        <NewsItem
          sentiment="warn"
          headline="BB holds policy rate at 10% for H2 FY26 — inflation still 'elevated and uneven' above 7% target"
          detail="Governor Ahsan H. Mansur cited crowding-out pressure: government borrowing running at 29% growth vs 18.1% target, leaving private credit at just 6.1% vs 8% target. Any premature rate cut risks renewed taka depreciation pressure."
          source="The Daily Star"
          sourceUrl="https://www.thedailystar.net/business/economy/news/bb-holds-policy-rate-10-tough-trade-inflation-vs-growth-4102396"
          time="Feb 9, 2026"
        />
        <NewsItem
          sentiment="bull"
          headline="SDF rate cut 50bps to 7.5% — BB recalibrates to channel excess bank liquidity into private lending"
          detail="Commercial banks currently park excess funds at BB rather than lend to private sector. The SDF cut narrows the spread, incentivising deployment toward CMSMEs and agriculture, where loan provisioning rules have also been relaxed."
          source="TBS News"
          sourceUrl="https://www.tbsnews.net/economy/bb-unveils-monetay-policy-second-half-fy26-keeping-policy-rate-unchanged-10-1355671"
          time="Feb 9, 2026"
        />
        <NewsItem
          sentiment="neu"
          headline="Sammilito Islami Bank launched — merger of 5 troubled Shariah banks creates largest Islamic lender with Tk33,000cr capital"
          detail="Under the Bank Resolution Ordinance 2025, BB has merged five distressed Islamic banks. Nine NBFIs have been sent for liquidation. The Bangladesh Bank Order remains stuck at Ministry of Finance despite October submission."
          source="The Daily Star"
          sourceUrl="https://www.thedailystar.net/business/news/bangladesh-bank-holds-key-rate-10-cuts-deposit-rate-spur-lending-4101786"
          time="Feb 2026"
        />
        <NewsItem
          sentiment="bull"
          headline="BSEC invites public comment on new Whistleblower Protection Rules 2026 — dual mechanism for market integrity"
          detail="Rules drafted under Section 33(1) of Securities and Exchange Ordinance 1969 and Section 24(1) of BSEC Act 1993. BSEC also signed MoU with UNDP on January 28, 2026."
          source="BSS / BSEC Official"
          sourceUrl="https://www.sec.gov.bd/"
          time="Mar 1, 2026"
        />
      </div>
    </div>
  );
}

function SectionMacro() {
  return (
    <div className="section scroll-target" id="macro">
      <SectionHeader num="02" title="Key Macroeconomic Indicators" icon="📊" />

      <div className="cards-grid" style={{ marginBottom: 16 }}>
        <MetricCard
          label="CPI Inflation (Jan 2026)"
          value="8.58%"
          change="▲ +0.09pp from Dec 8.49%"
          changeType="bear"
          sub="3rd consecutive monthly rise. Food 8.29%, Housing 8.48%, Clothing 11.00%. BB target: <7%"
          accent="bear"
          pill="ABOVE TARGET"
          pillType="bear"
        />
        <MetricCard
          label="Remittances — February 2026"
          value="$3.02B"
          change="▲ +19.4% YoY"
          changeType="bull"
          sub="Eid/Ramadan-driven surge. FY26 cumulative (Jul–Feb): $22.45B (+21.4%). January set record $3.17B."
          accent="bull"
          pill="RECORD FEB"
          pillType="bull"
        />
        <MetricCard
          label="GDP Growth (FY2024-25)"
          value="3.49%"
          change="▼ Slowest in recent history"
          changeType="bear"
          sub="Goods exports declined YoY for 6th consecutive month in January. Nominal GDP USD 451B."
          accent="bear"
          pill="SOFT"
          pillType="warn"
        />
        <MetricCard
          label="Private Credit Growth"
          value="6.1%"
          change="▼ vs 8% target"
          changeType="bear"
          sub="Banks crowding into T-bills/bonds amid elevated govt borrowing (29% vs 18.1% target). Crowding-out risk elevated."
          accent="bear"
          pill="BELOW TARGET"
          pillType="bear"
        />
        <MetricCard
          label="Gross Forex Reserves"
          value="$35.11B"
          change="▲ vs $26.26B a year ago"
          changeType="bull"
          sub="As of Feb 26, 2026. IMF BPM6: $30.36B vs $21.08B prior year. BB purchased $5.38B from market in FY26."
          accent="bull"
          pill="RISING"
          pillType="bull"
        />
        <MetricCard
          label="12-month Inflation Avg"
          value="8.66%"
          change="Well above 7% BB target"
          changeType="bear"
          sub="Taka has lost ~43% value vs USD since 2021. Despite tightening, price pressure remains uneven."
          accent="bear"
          pill="PERSISTENT"
          pillType="warn"
        />
      </div>

      <div className="context-box">
        <strong>Macro Outlook:</strong> Bangladesh faces a challenging balancing act — inflation remains stubbornly above target while growth has slowed to a multi-year low of 3.49%. Rising remittances ($3.02B in Feb) and recovering forex reserves ($35.11B gross) provide balance-of-payments relief, but goods export weakness (6th consecutive monthly decline) and subdued private credit signal fragile domestic demand. Middle East tension adds a remittance risk tail.
      </div>
    </div>
  );
}

function SectionDSE() {
  return (
    <div className="section scroll-target" id="dse">
      <SectionHeader num="03" title="Dhaka Stock Exchange" icon="📈" />

      <TickerStrip items={[

function App() {
  const [activeSection, setActiveSection] = useState("bb");

  function scrollTo(id) {
    setActiveSection(id);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  }

  // Track scroll position to update active nav
  useEffect(() => {
    function onScroll() {
      const ids = SECTIONS.map(s => s.id);
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 140) {
          setActiveSection(ids[i]);
          return;
        }
      }
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div>
      {/* Header */}
      <header className="header">
        <div className="header-left">
          <div className="brand">THE <span>BRIEF</span></div>
          <div className="tagline">Bangladesh Business Intelligence</div>
        </div>
        <div className="header-right">
          <div className="date-stamp">{BRIEF_DATE}</div>
          <div className="date-stamp" style={{ marginTop: 3 }}>{BRIEF_EDITION}</div>
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 4 }}>
            <span className="live-badge">
              <span className="live-dot" />
              LIVE
            </span>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav className="nav">
        {SECTIONS.map(s => (
          <button
            key={s.id}
            className={`nav-btn ${activeSection === s.id ? "active" : ""}`}
            onClick={() => scrollTo(s.id)}
          >
            {s.label}
          </button>
        ))}
      </nav>

      {/* Body */}
      <main className="main">
        <SectionBB />
        <hr className="divider" />
        <SectionMacro />
        <hr className="divider" />
        <SectionDSE />
        <hr className="divider" />
        <SectionTBond />
        <hr className="divider" />
        <SectionComm />
        <hr className="divider" />
        <SectionFX />
        <hr className="divider" />
        <SectionTariff />
        <hr className="divider" />
        <SectionTrade />
      </main>

      {/* Footer */}
      <footer className="footer">
        <div>
          <span>Sources: </span>
          {[
            ["The Daily Star", "https://www.thedailystar.net"],
            ["TBS News", "https://www.tbsnews.net"],
            ["Financial Express BD", "https://today.thefinancialexpress.com.bd"],
            ["Bangladesh Bank", "https://www.bb.org.bd"],
            ["Trading Economics", "https://tradingeconomics.com/bangladesh"],
            ["Al Jazeera", "https://www.aljazeera.com"],
            ["The Diplomat", "https://thediplomat.com"],
          ].map(([name, url], i) => (
            <span key={i}>
              {i > 0 && " · "}
              <a href={url} target="_blank" rel="noreferrer">{name}</a>
            </span>
          ))}
        </div>
        <div>THE BRIEF · Bangladesh · {new Date().getFullYear()}</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
