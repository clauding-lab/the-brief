<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE BRIEF — Bangladesh Business Intelligence</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Brief" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2329;
      --border2:   #2a3040;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #3b82f6;
      --accent2:   #1d4ed8;
      --bull:      #22c55e;
      --bear:      #ef4444;
      --warn:      #f59e0b;
      --neutral:   #94a3b8;
      --tag-bg:    #1e2329;
      --pill-bear: rgba(239,68,68,0.12);
      --pill-bull: rgba(34,197,94,0.12);
      --pill-warn: rgba(245,158,11,0.12);
      --pill-neu:  rgba(148,163,184,0.1);
      --brand-color: #ffffff;
    }

    :root.light {
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --border2:   #cbd5e1;
      --text:      #1e293b;
      --muted:     #64748b;
      --accent:    #2563eb;
      --accent2:   #1d4ed8;
      --bull:      #16a34a;
      --bear:      #dc2626;
      --warn:      #d97706;
      --neutral:   #475569;
      --tag-bg:    #f1f5f9;
      --pill-bear: rgba(220,38,38,0.08);
      --pill-bull: rgba(22,163,74,0.08);
      --pill-warn: rgba(217,119,6,0.08);
      --pill-neu:  rgba(71,85,105,0.08);
      --brand-color: #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {}
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--brand-color);
      text-transform: uppercase;
    }
    .brand span { color: var(--accent); }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right {
      text-align: right;
    }
    .date-stamp {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--bull);
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      margin-top: 5px;
    }
    .live-dot {
      width: 5px; height: 5px;
      background: var(--bull);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Nav Bar ── */
    .nav {
      display: flex; gap: 0; padding: 0;
      background: var(--bg); border-bottom: 1px solid var(--border);
      overflow: visible;
      position: fixed; top: 80px; left: 0; right: 0; z-index: 99;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-group { position: relative; flex: 1; }
    .nav-group-btn {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 10px 16px; cursor: pointer;
      white-space: nowrap; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      display: flex; align-items: center; gap: 4px;
      width: 100%; justify-content: center;
    }
    .nav-group-btn:hover { color: var(--text); }
    .nav-group-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-chevron { font-size: 7px; transition: transform .2s; }
    .nav-group-btn.open .nav-chevron { transform: rotate(180deg); }
    .nav-dropdown {
      position: absolute; top: 100%; left: 0; min-width: 160px;
      background: var(--surface); border: 1px solid var(--border); border-top: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 101;
      padding: 4px 0;
      opacity: 0; transform: translateY(-4px); pointer-events: none;
      transition: opacity .15s, transform .15s;
    }
    .nav-dropdown.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .nav-drop-item {
      display: block; width: 100%; background: none; border: none;
      color: var(--muted); font-family: inherit; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; cursor: pointer; text-align: left;
      white-space: nowrap; transition: color .15s, background .15s;
    }
    .nav-drop-item:hover { color: var(--text); background: var(--border); }
    .nav-drop-item.active { color: var(--accent); background: rgba(59,130,246,0.08); }

    /* ── Main layout ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 32px;
      padding-top: 68px;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-num {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      background: var(--tag-bg);
      padding: 2px 7px;
      border-radius: 2px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .section-icon {
      font-size: 14px;
      margin-left: auto;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .cards-grid-3 {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }

    /* News headline cards */
    .headline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .headline-card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; transition: border-color .2s; text-decoration: none; color: inherit; }
    .headline-card:hover { border-color: var(--border2); }
    .headline-title { font-size: 11.5px; font-weight: 600; line-height: 1.5; color: var(--text); margin-bottom: 6px; }
    .headline-meta { font-size: 9px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
    .headline-source-tag { font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .oped-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; margin-top: 16px; }
    .oped-card { display: block; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 4px; padding: 14px 16px; text-decoration: none; color: inherit; }
    .oped-card:hover { border-color: var(--border2); }
    .oped-title { font-size: 12px; font-weight: 700; line-height: 1.5; margin-bottom: 4px; color: var(--text); }
    .oped-author { font-size: 10px; color: var(--muted); font-style: italic; margin-bottom: 6px; }
    .oped-summary { font-size: 11px; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
    .oped-meta { font-size: 9px; color: var(--muted); }
    .subsection-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 20px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      position: relative;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--border2); }

    .card-accent-bull { border-left: 3px solid var(--bull); }
    .card-accent-bear { border-left: 3px solid var(--bear); }
    .card-accent-warn { border-left: 3px solid var(--warn); }
    .card-accent-neu  { border-left: 3px solid var(--neutral); }
    .card-accent-blue { border-left: 3px solid var(--accent); }

    .card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-color);
      line-height: 1.2;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .15s, background .15s, border-color .15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border2); }

    /* ── Subscribe button ── */
    .subscribe-btn {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 3px 10px;
      border-radius: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
      transition: background .15s, border-color .15s;
    }
    .subscribe-btn:hover { background: rgba(59,130,246,0.2); border-color: var(--accent); }

    /* ── Subscribe modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      width: 340px;
      padding: 24px 24px 20px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none; border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      border-radius: 2px;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 4px;
    }
    .modal-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }
    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-label .req { color: var(--accent); margin-left: 2px; }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 2px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); opacity: 0.55; }
    .submit-btn {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .submit-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; opacity: 0.55; }
    .submit-btn:not(:disabled):hover { background: var(--accent2); }

    .card-value-sm { font-size: 18px; }

    .card-change {
      font-size: 11px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .bull { color: var(--bull); }
    .bear { color: var(--bear); }
    .warn { color: var(--warn); }
    .neu  { color: var(--neutral); }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── Pill tags ── */
    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 600;
    }
    .pill-bull { background: var(--pill-bull); color: var(--bull); border: 1px solid rgba(34,197,94,0.25); }
    .pill-bear { background: var(--pill-bear); color: var(--bear); border: 1px solid rgba(239,68,68,0.25); }
    .pill-warn { background: var(--pill-warn); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
    .pill-neu  { background: var(--pill-neu);  color: var(--neutral); border: 1px solid rgba(148,163,184,0.2); }
    .pill-blue { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.25); }

    /* ── News items ── */
    .news-list { display: flex; flex-direction: column; gap: 8px; }
    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .news-item:hover { border-color: var(--border2); }
    .news-bullet {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .news-content {}
    .news-headline {
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }
    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .news-source {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .news-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .news-source a:hover { text-decoration: underline; }
    .news-time {
      font-size: 9px;
      color: var(--muted);
    }

    /* ── Ticker strip ── */
    .ticker-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .ticker-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ticker-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .ticker-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }
    .ticker-chg { font-size: 10px; }

    /* ── Table ── */
    .brief-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .brief-table th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      background: var(--surface);
    }
    .brief-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .brief-table tr:last-child td { border-bottom: none; }
    .brief-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── Two-col layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px; }
      .header { padding: 16px; }
      .nav-group-btn { padding: 10px 4px; font-size: 8px; letter-spacing: 0.04em; }
      .nav-dropdown { min-width: 140px; }
    }

    /* ── Context box ── */
    .context-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }
    .context-box strong { color: var(--text); }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--text);
      opacity: 0.6;
      letter-spacing: 0.08em;
    }
    .footer a {
      color: var(--text);
      text-decoration: none;
    }
    .footer a:hover { color: var(--accent); opacity: 1; }
    @media (max-width: 768px) {
      .footer {
        flex-direction: column;
        gap: 6px;
        text-align: center;
        padding: 16px 20px calc(80px + env(safe-area-inset-bottom, 0px));
      }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Signal bar ── */
    .signal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .signal-label { font-size: 10px; color: var(--muted); min-width: 80px; }
    .signal-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .signal-bar-fill { height: 100%; border-radius: 2px; }
    .signal-val { font-size: 10px; font-weight: 700; min-width: 50px; text-align: right; }

    /* ── Impact notice ── */
    .impact-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .impact-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
    .impact-text { font-size: 11px; color: var(--warn); line-height: 1.6; }
    .impact-text strong { color: #fff; }
    :root.light .impact-text strong { color: var(--text); }

    /* ── Sub-section heading ── */
    .sub-head {
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      padding: 14px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Section scroll target ── */
    .scroll-target { scroll-margin-top: 100px; }

    /* ── Time stamp ── */
    .ts {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ════════════════════════════════════════
       NEW ENHANCEMENTS — added Mar 2026
    ════════════════════════════════════════ */

    /* ── Traffic Light ── */
    .traffic-light {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
    }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-dot.bull  { background: var(--bull); box-shadow: 0 0 5px var(--bull); }
    .tl-dot.bear  { background: var(--bear); box-shadow: 0 0 5px var(--bear); }
    .tl-dot.warn  { background: var(--warn); box-shadow: 0 0 5px var(--warn); }

function Sparkline({ data, color }) {
  const w = 80, h = 24, pad = 2;
  const vals = data.map(Number);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <div className="sparkline-wrap">
      <svg width={w} height={h} style={{ overflow: "visible" }}>

                r="2.5" fill={color || "var(--accent)"} />
      </svg>

  );

function DSEXChart() {
  const data = [
    { label: "Feb 10", value: 5399 },
    { label: "Feb 11", value: 5400 },
    { label: "Feb 15", value: 5600, showLabel: true, event: "bnp" },
    { label: "Feb 16", value: 5570 },
    { label: "Feb 17", value: 5570 },
    { label: "Feb 18", value: 5519 },
    { label: "Feb 19", value: 5465, showLabel: true },
    { label: "Feb 22", value: 5467 },
    { label: "Feb 23", value: 5553 },
    { label: "Feb 24", value: 5542 },
    { label: "Feb 25", value: 5554 },
    { label: "Feb 26", value: 5600, showLabel: true },
    { label: "Mar 1", value: 5462, showLabel: true },
    { label: "Mar 2", value: 5534 },
    { label: "Mar 3", value: 5325, showLabel: true, event: "crash" },
    { label: "Mar 4", value: 5323 },
    { label: "Mar 5", value: 5241 },
    { label: "Mar 6", value: 5241 },
    { label: "Mar 9", value: 5009, showLabel: true },
    { label: "Mar 10", value: 5290, showLabel: true },
    { label: "Mar 11", value: 5008, showLabel: true },
    { label: "Mar 12", value: 5008, showLabel: true, today: true },
  ];

  const W = 720, H = 270;
  const pad = { top: 46, right: 30, bottom: 62, left: 62 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;
  const _vals = data.map(d => d.value);
  const minV = Math.floor(Math.min(..._vals) / 100) * 100 - 100;
  const maxV = Math.ceil(Math.max(..._vals) / 100) * 100 + 80;

  const cx = i => pad.left + (i / (data.length - 1)) * iW;
  const cy = v => pad.top + ((maxV - v) / (maxV - minV)) * iH;

  const bnpIdx   = data.findIndex(d => d.event === "bnp");
  const crashIdx = data.findIndex(d => d.event === "crash");
  const todayIdx = data.findIndex(d => d.today);
  const splitIdx = crashIdx >= 0 ? crashIdx : data.length;

  const allPts   = data.map((d, i) => `${cx(i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ");
  const bluePts  = data.slice(0, splitIdx).map((d, i) => `${cx(i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ");
  const redPts   = splitIdx > 0 ? data.slice(splitIdx - 1).map((d, i) => `${cx(splitIdx - 1 + i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ") : "";
  const areaPts  = `${cx(0).toFixed(1)},${(H - pad.bottom).toFixed(1)} ${allPts} ${cx(data.length - 1).toFixed(1)},${(H - pad.bottom).toFixed(1)}`;

  const gridVals = [];
  for (let _gv = Math.ceil(minV / 100) * 100 + 50; _gv <= maxV; _gv += 100) gridVals.push(_gv);

  const _tv = todayIdx >= 0 ? data[todayIdx].value : 0;
  const _pv = todayIdx > 0 ? data[todayIdx - 1].value : _tv;
  const _pct = _pv ? ((_tv - _pv) / _pv * 100) : 0;
  const _todayUp = _pct >= 0;
  const _todayColor = _todayUp ? "var(--bull)" : "var(--bear)";

    return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 4, padding: "12px 0 0" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>

        {/* Y-axis title */}
        <text x={0} y={0} fill="var(--muted)" fontSize="9.5" textAnchor="middle"
          transform={`translate(13,${(pad.top + (H - pad.bottom)) / 2}) rotate(-90)`}>DSEX</text>

        {/* Grid */}
        {gridVals.map(v => (
          <g key={v}>
            <line x1={pad.left} y1={cy(v)} x2={W - pad.right} y2={cy(v)}
              stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3" />
            <text x={pad.left - 6} y={cy(v) + 4} fill="var(--muted)" fontSize="10" textAnchor="end">
              {v.toLocaleString()}
            </text>
          </g>
        ))}

        {/* Area fill */}
        <polygon points={areaPts} fill="rgba(59,130,246,0.06)" />

        {/* Bull segment: index 0–13 */}
        <polyline points={bluePts} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" />

        {/* Bear segment: index 13–18 */}
        <polyline points={redPts} fill="none" stroke="var(--bear)" strokeWidth="2.5" strokeLinejoin="round" />

        {/* ── Annotations ── */}

        {/* BNP win annotation */}
        {bnpIdx >= 0 && (<>
        <line x1={cx(bnpIdx)} y1={cy(data[bnpIdx].value) - 5} x2={cx(bnpIdx)} y2={pad.top - 4}
          stroke="var(--bull)" strokeWidth="1" strokeDasharray="3,2" />
        <rect x={cx(bnpIdx) - 54} y={pad.top - 40} width={108} height={36} rx={3}
          fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.35)" strokeWidth="1" />
        <text x={cx(bnpIdx)} y={pad.top - 24} fill="var(--bull)" fontSize="9" textAnchor="middle" fontWeight="700">BNP Wins Election</text>
        <text x={cx(bnpIdx)} y={pad.top - 12} fill="var(--bull)" fontSize="9" textAnchor="middle">+200pts · {data[bnpIdx].label}</text>
        </>)}

        {/* Crash annotation */}
        {crashIdx >= 0 && (<>
        <line x1={cx(crashIdx)} y1={cy(data[crashIdx].value) + 5} x2={cx(crashIdx)} y2={cy(data[crashIdx].value) + 17}
          stroke="var(--bear)" strokeWidth="1" strokeDasharray="3,2" />
        <rect x={cx(crashIdx) - 62} y={cy(data[crashIdx].value) + 19} width={124} height={36} rx={3}
          fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" strokeWidth="1" />
        <text x={cx(crashIdx)} y={cy(data[crashIdx].value) + 33} fill="var(--bear)" fontSize="9" textAnchor="middle" fontWeight="700">Worst fall in 6 years</text>
        <text x={cx(crashIdx)} y={cy(data[crashIdx].value) + 45} fill="var(--bear)" fontSize="9" textAnchor="middle">−209pts · {data[crashIdx].label}</text>
        </>)}

        {/* Today label — computed from data */}
        {todayIdx >= 0 && (<>
        <text x={cx(todayIdx) - 6} y={cy(_tv) - 14} fill={_todayColor} fontSize="10" textAnchor="end" fontWeight="700">{_tv.toLocaleString()}</text>
        <text x={cx(todayIdx) - 6} y={cy(_tv) - 3}  fill={_todayColor} fontSize="9"  textAnchor="end">{data[todayIdx].label.toUpperCase()} · {_todayUp ? "+" : ""}{_pct.toFixed(2)}%</text>
        </>)}

        {/* Dots */}
        {data.map((d, i) => {
          const isKey = i === bnpIdx || i === crashIdx;
          const isToday = i === todayIdx;
          const col = crashIdx >= 0 && i >= splitIdx - 1 ? "var(--bear)" : "var(--accent)";
          return (
            <circle key={i} cx={cx(i)} cy={cy(d.value)}
              r={isKey || isToday ? 4.5 : 2.5}
              fill={i === bnpIdx ? "var(--bull)" : col}
              stroke="var(--surface)" strokeWidth="1.5" />
          );
        })}

        {/* X-axis labels (selected) */}
        {data.map((d, i) => {
          if (!d.showLabel) return null;
          const col = crashIdx >= 0 && i >= splitIdx - 1 ? "var(--bear)" : i === bnpIdx ? "var(--bull)" : "var(--muted)";
        
   return (
            <text key={i} x={cx(i)} y={H - pad.bottom + 16} fill={col} fontSize="9" textAnchor="middle">{d.label}</text>
          );
        })}

      </svg>

      {/* Legend */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 20px", padding: "4px 16px 12px", fontSize: 10, color: "var(--muted)", alignItems: "center" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ display: "inline-block", width: 20, height: 2, background: "var(--accent)", borderRadius: 1 }} />
          DSEX daily close
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ display: "inline-block", width: 20, height: 2, background: "var(--bear)", borderRadius: 1 }} />
          Post-war shock (Mar)
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ display: "inline-block", width: 9, height: 9, borderRadius: "50%", background: "var(--bull)" }} />
          Key event
        </span>
        <span style={{ marginLeft: "auto" }}>Source: DSE · TBS News · The Daily Star</span>
      </div>
    </div>
  );
}

function TBillChart() {
  const W = 680, H = 230;
  const pad = { top: 50, right: 44, bottom: 44, left: 52 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;

  const yMin = 9.65, yMax = 10.85;
  const labels = ["Nov '25", "Dec '25", "Jan '26", "Feb '26", "Mar '26"];
  const d91  = [10.08, 10.47, 10.42, 10.24, 9.90];
  const d182 = [10.30, 10.60, 10.54, 9.99, 9.98];
  const d364 = [10.04, 10.61, 10.66, 10.07, 9.93];
  const n = labels.length;

  const cx = i => pad.left + (i / (n - 1)) * iW;
  const cy = v => pad.top + ((yMax - v) / (yMax - yMin)) * iH;
  const pts = arr => arr.map((v, i) => `${cx(i).toFixed(1)},${cy(v).toFixed(1)}`).join(" ");

  const policyY = cy(10.00);
  const yTicks  = [9.75, 10.00, 10.25, 10.50, 10.75];

  const pkI = 2, pkV = d364[2];
  const pkX = cx(pkI), pkY = cy(pkV);
  const pkBw = 72, pkBh = 22, pkBx = pkX - pkBw / 2, pkBy = pad.top - 44;

  const bpX = cx(4), bpY = cy(d182[4]);
  const bpBw = 112, bpBh = 22;
  const bpBx = bpX - bpBw - 8, bpBy = bpY - bpBh - 16;

    return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 4, padding: "12px 0 4px", marginTop: 12 }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>

        {yTicks.map(v => (
          <g key={v}>
            <line x1={pad.left} y1={cy(v)} x2={W - pad.right} y2={cy(v)}
              stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3" />
            <text x={pad.left - 6} y={cy(v) + 4} fill="var(--muted)" fontSize="10" textAnchor="end">{v.toFixed(2)}%</text>
          </g>
        ))}

        <line x1={pad.left} y1={policyY} x2={W - pad.right} y2={policyY}
          stroke="rgba(234,179,8,0.6)" strokeWidth="1.5" strokeDasharray="6,3" />
        <text x={W - pad.right + 3} y={policyY + 4} fill="var(--warn)" fontSize="9" textAnchor="start">Policy</text>

        <polyline points={pts(d91)}  fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" />
        <polyline points={pts(d182)} fill="none" stroke="var(--bull)"   strokeWidth="2" strokeLinejoin="round" />
        <polyline points={pts(d364)} fill="none" stroke="var(--warn)"   strokeWidth="2" strokeLinejoin="round" />

        <line x1={pkX} y1={pkY - 4} x2={pkX} y2={pkBy + pkBh}
          stroke="var(--warn)" strokeWidth="1" strokeDasharray="3,2" />
        <rect x={pkBx} y={pkBy} width={pkBw} height={pkBh} rx={3}
          fill="rgba(234,179,8,0.15)" stroke="rgba(234,179,8,0.4)" strokeWidth="1" />
        <text x={pkX} y={pkBy + 9}  fill="var(--warn)" fontSize="8.5" textAnchor="middle" fontWeight="700">Jan peak</text>
        <text x={pkX} y={pkBy + 18} fill="var(--warn)" fontSize="8.5" textAnchor="middle">10.66% (364d)</text>

        <rect x={bpBx} y={bpBy} width={bpBw} height={bpBh} rx={3}
          fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" strokeWidth="1" />
        <text x={bpBx + bpBw / 2} y={bpBy + 9}  fill="var(--bull)" fontSize="8.5" textAnchor="middle" fontWeight="700">Mar '26 auction</text>
        <text x={bpBx + bpBw / 2} y={bpBy + 18} fill="var(--bull)" fontSize="8.5" textAnchor="middle">All tenors below 10%</text>

        {[d91, d182, d364].map((arr, si) => {
          const cols = ["var(--accent)", "var(--bull)", "var(--warn)"];
          return arr.map((v, i) => (
            <circle key={`${si}-${i}`} cx={cx(i)} cy={cy(v)} r={3}
              fill={cols[si]} stroke="var(--surface)" strokeWidth="1.5" />
          ));
        })}

        {labels.map((l, i) => (
          <text key={i} x={cx(i)} y={H - pad.bottom + 16} fill="var(--muted)" fontSize="10" textAnchor="middle">{l}</text>
        ))}

        <circle cx={pad.left + 10} cy={pad.top - 28} r={4} fill="var(--accent)" />
        <text x={pad.left + 18} y={pad.top - 24} fill="var(--fg)" fontSize="9.5">91-day</text>
        <circle cx={pad.left + 68} cy={pad.top - 28} r={4} fill="var(--bull)" />
        <text x={pad.left + 76} y={pad.top - 24} fill="var(--fg)" fontSize="9.5">182-day</text>
        <circle cx={pad.left + 130} cy={pad.top - 28} r={4} fill="var(--warn)" />
        <text x={pad.left + 138} y={pad.top - 24} fill="var(--fg)" fontSize="9.5">364-day</text>
      </svg>
      <div style={{ fontSize: 9, color: "var(--muted)", textAlign: "right", paddingRight: 12, marginTop: 4 }}>
        Source: Bangladesh Bank primary auction results · Policy rate: 10.00% · Last auction: 9 Mar 2026
      </div>
    </div>
  );
}

function OilChart() {
  const { useState, useEffect } = React;

  const AV_KEY = "T294W0RCT1U6OOPE";

  const STATIC_DATA = [
    { label: "Oct '25", value: 63.2 },
    { label: "Jan '26", value: 62.0 },
    { label: "Jan 30", value: 72.0 },
    { label: "Mid-Feb", value: 77.0 },
    { label: "Feb 28", value: 69.0, event: true },
    { label: "Mar 2", value: 82.0 },
    { label: "Mar 4", value: 82.8 },
    { label: "Mar 6", value: 92.69 },
    { label: "Mar 8", value: 98.98 },
    { label: "Mar 9", value: 94.50 },
    { label: "Mar 11", value: 89.45 },
    { label: "Mar 12", value: 99.22, today: true },
  ];

  
  
  
  
  
  
  
  
  
  const [data, setData]     = useState(STATIC_DATA);
  const [isLive, setIsLive] = useState(false);

  useEffect(() => {
    fetch(`https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${AV_KEY}`)
      .then(r => r.json())
      .then(json => {
        if (!json.data || json.data.length === 0) return;
        // Take only the most recent valid price — update the last data point live
        // Chart structure stays locked to STATIC_DATA; only the current price refreshes
        const latest = json.data.find(d => parseFloat(d.value) > 0);
        if (!latest) return;
        const liveVal = parseFloat(latest.value);
        // Guard: AV free tier has 1-3 day lag — reject stale data if it
        // deviates more than 15% below the static value (e.g. post-spike events)
        const staticVal = STATIC_DATA[STATIC_DATA.length - 1].value;
        if (liveVal < staticVal * 0.85) return;
        setData(prev => {
          const updated = [...prev];
          updated[updated.length - 1] = { ...updated[updated.length - 1], value: liveVal };
          return updated;
        });
        setIsLive(true);
      })
      .catch(() => {});
  }, []);

  const W = 720, H = 270;
  const pad = { top: 46, right: 58, bottom: 68, left: 54 };
  const iW = W - pad.left - pad.right;
  const iH = H - pad.top - pad.bottom;

  const vals   = data.map(d => d.value);
  const minV   = Math.floor((Math.min(...vals) - 5) / 5) * 5;
  const maxV   = Math.ceil ((Math.max(...vals) + 5) / 5) * 5;

  const cx = i => pad.left + (i / (data.length - 1)) * iW;
  const cy = v => pad.top  + ((maxV - v) / (maxV - minV)) * iH;

  const linePoints = data.map((d, i) => `${cx(i).toFixed(1)},${cy(d.value).toFixed(1)}`).join(" ");
  const areaPoints = `${cx(0).toFixed(1)},${(H-pad.bottom).toFixed(1)} ${linePoints} ${cx(data.length-1).toFixed(1)},${(H-pad.bottom).toFixed(1)}`;

  const gridVals = [];
  for (let v = minV + 5; v < maxV; v += 5) gridVals.push(v);

  const eIdx    = Math.max(0, data.findIndex(d => d.event) === -1 ? Math.floor(data.length * 0.7) : data.findIndex(d => d.event));
  const lastIdx = data.length - 1;
  const lastVal = data[lastIdx].value;

function App() {
  const [activeSection, setActiveSection] = useState("bb");
  const [dark, setDark] = useState(false);
  const [openGroup, setOpenGroup] = useState(null);

  // ── Subscribe modal state ─────────────────────────────────────────────────
  const [showSubscribe, setShowSubscribe] = useState(false);
  const [subName,       setSubName]       = useState("");
  const [subOrg,        setSubOrg]        = useState("");
  const [subEmail,      setSubEmail]      = useState("");
  const [subSubmitted,  setSubSubmitted]  = useState(false);
  const [subLoading,    setSubLoading]    = useState(false);
  const [subError,      setSubError]      = useState("");
  const canSubmit = subName.trim().length > 0 && subEmail.trim().length > 0 && !subLoading;

  async function handleSubscribe(e) {
    e.preventDefault();
    setSubLoading(true);
    setSubError("");
    const { error } = await _sb.from("subscribers").insert({
      name:         subName.trim(),
      organisation: subOrg.trim() || null,
      email:        subEmail.trim().toLowerCase(),
    });
    setSubLoading(false);
    if (error) {
      if (error.code === "23505") { setSubSubmitted(true); return; }
      setSubError("Something went wrong. Please try again.");
      return;
    }
    setSubSubmitted(true);
  }

  function closeModal() {
    setShowSubscribe(false);
    if (subSubmitted) {
      setSubName(""); setSubOrg(""); setSubEmail(""); setSubSubmitted(false);
    }
    setSubError("");
  }

  // ── Custom bottom-nav slots (persisted in localStorage) ───────────────────
  const [customSlots, setCustomSlots] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("tb-custom-slots")) || ["remit","banking"]; }
    catch { return ["remit","banking"]; }
  });
  const [editingSlot, setEditingSlot] = React.useState(null);
  const lpTimer = React.useRef(null);

  const NAV_ICON = {
    bb:"🏦", macro:"📊", dse:"📈", tbond:"📜", comm:"🌾", dam:"🛒",
    fx:"💱", remit:"💸", banking:"🏛️", tariff:"🇺🇸", trade:"🚢",
    iranwar:"🛢️", rmg:"👕", fiscal:"💰", nbr:"🧾", power:"⚡", peers:"🌏"
  };

  function startLP(idx) {
    lpTimer.current = setTimeout(() => setEditingSlot(idx), 500);
  }
  function cancelLP() { clearTimeout(lpTimer.current); }

  function pickSlot(sectionId) {
    const next = [...customSlots];
    next[editingSlot] = sectionId;
    setCustomSlots(next);
    try { localStorage.setItem("tb-custom-slots", JSON.stringify(next)); } catch {}
    setEditingSlot(null);
  }

  useEffect(() => {
    document.documentElement.classList.toggle("light", !dark);
  }, [dark]);

  useEffect(() => {
    function positionNav() {
      const hdr = document.querySelector('.header');
      const nav = document.querySelector('.nav');
      const main = document.querySelector('.main');
      if (!hdr || !nav || !main) return;
      const hh = hdr.offsetHeight;
      const nh = nav.offsetHeight;
      nav.style.top = hh + 'px';
      main.style.paddingTop = (hh + nh + 4) + 'px';
    }
    positionNav();
    window.addEventListener('resize', positionNav);
    return () => window.removeEventListener('resize', positionNav);
  }, []);

  function scrollTo(id) {
    setActiveSection(id);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  }

  useEffect(() => {
    function onScroll() {
      const ids = SECTIONS.map(s => s.id);
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 140) {
          setActiveSection(ids[i]);
          return;
        }
      }
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  // ── Close nav dropdown on click outside ──
  useEffect(() => {
    if (!openGroup) return;
    function handleClickOutside(e) {
      if (!e.target.closest('.nav-group')) setOpenGroup(null);
    }
    document.addEventListener('mousedown', handleClickOutside);
    document.addEventListener('touchstart', handleClickOutside);
    return () => {
      document.removeEventListener('mousedown', handleClickOutside);
      document.removeEventListener('touchstart', handleClickOutside);
    };
  }, [openGroup]);

  return (
    <div>
      {/* Header */}
      <header className="header">
        <div className="header-left">
          <div className="brand">THE <span>BRIEF</span></div>
          <div className="tagline">Bangladesh Business Intelligence</div>
        </div>
        <div className="header-right">
          <div className="date-stamp">{BRIEF_DATE}</div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, marginTop: 6 }}>
            <button className="subscribe-btn" onClick={() => setShowSubscribe(true)}>
              ✉ Subscribe
            </button>
            <button className="theme-toggle" onClick={() => setDark(d => !d)}>
              {dark ? "☀ Light" : "☾ Dark"}
            </button>
          </div>
        </div>
      </header>

      {/* Nav */}
      <nav className="nav">
        {NAV_GROUPS.map(g => {
          const isActiveGroup = g.ids.includes(activeSection);
          const isOpen = openGroup === g.key;
          return (
            <div key={g.key} className="nav-group">
              <button
                className={`nav-group-btn${isActiveGroup ? " active" : ""}${isOpen ? " open" : ""}`}
                onClick={() => setOpenGroup(isOpen ? null : g.key)}
              >
                {g.label}
                <span className="nav-chevron">&#9662;</span>
              </button>
              <div className={`nav-dropdown${isOpen ? " visible" : ""}`}>
                {g.ids.map(id => {
                  const sec = SECTIONS.find(s => s.id === id);
                  if (!sec) return null;
                  return (
                    <button key={id}
                      className={`nav-drop-item${activeSection === id ? " active" : ""}`}
                      onClick={() => { scrollTo(id); setOpenGroup(null); }}
                    >{sec.label}</button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </nav>

      {/* Body */}
      <main className="main">
        <SectionExec />
        <hr className="divider" />
        <SectionHeadlines />
        <hr className="divider" />
        <SectionBB />
        <hr className="divider" />
        <SectionMacro />
        <hr className="divider" />
        <SectionDSE />
        <hr className="divider" />
        <SectionTBond />
        <hr className="divider" />
        <SectionComm />
        <hr className="divider" />
        <SectionDAM />
        <hr className="divider" />
        <SectionFX />
        <hr className="divider" />
        <SectionRemittance />
        <hr className="divider" />
        <SectionBanking />
        <hr className="divider" />
        <SectionTariff />
        <hr className="divider" />
        <SectionTrade />
        <hr className="divider" />
        <SectionIranWar />
        <hr className="divider" />
        <SectionRMG />
        <hr className="divider" />
        <SectionFiscal />
        <hr className="divider" />
        <SectionNBR />
        <hr className="divider" />
        <SectionPower />
        <hr className="divider" />
        <SectionPeers />
      </main>

      {/* Mobile Bottom Nav */}
      <nav className="bottom-nav">
        {[
          { id: "exec",    icon: "📋", label: "Summary" },
          { id: "dse",     icon: "📈", label: "DSE" },
          { id: "iranwar", icon: "🛢️", label: "Iran/Oil" },
        ].map(s => (
          <button key={s.id}
            className={`bottom-nav-btn ${activeSection === s.id ? "active" : ""}`}
            onClick={() => scrollTo(s.id)}>
            <span className="bottom-nav-icon">{s.icon}</span>
            {s.label}
          </button>
        ))}
        {customSlots.map((sid, idx) => {
          const sec = SECTIONS.find(s => s.id === sid);
          if (!sec) return null;
          return (
            <button key={idx}
              className={`bottom-nav-btn customizable ${activeSection === sid ? "active" : ""}`}
              onClick={() => scrollTo(sid)}
              onPointerDown={() => startLP(idx)}
              onPointerUp={cancelLP}
              onPointerLeave={cancelLP}
              onContextMenu={e => { e.preventDefault(); setEditingSlot(idx); }}>
              <span className="bottom-nav-icon">{NAV_ICON[sid] || "📌"}</span>
              <span className="bottom-nav-edit-dot">✏️</span>
              {sec.short}
            </button>
          );
        })}
      </nav>

      {editingSlot !== null && (
        <div className="slot-picker">
          <div className="slot-picker-header">
            <span>Choose shortcut {editingSlot + 4}</span>
            <button className="slot-picker-close" onClick={() => setEditingSlot(null)}>✕</button>
          </div>
          <div className="slot-picker-grid">
            {SECTIONS
              .filter(s => !["exec","dse","iranwar"].includes(s.id) && !customSlots.includes(s.id))
              .map(s => (
                <button key={s.id}
                  className={`slot-picker-btn ${customSlots[editingSlot] === s.id ? "selected" : ""}`}
                  onClick={() => pickSlot(s.id)}>
                  <span className="slot-picker-btn-icon">{NAV_ICON[s.id] || "📌"}</span>
                  {s.short}
                </button>
              ))
            }
          </div>
        </div>
      )}

      <footer className="footer">
        <div>
          <span>Sources: </span>
          {[
            ["The Daily Star", "https://www.thedailystar.net"],
            ["TBS News", "https://www.tbsnews.net"],
            ["Financial Express BD", "https://today.thefinancialexpress.com.bd"],
            ["Bangladesh Bank", "https://www.bb.org.bd"],
            ["Trading Economics", "https://tradingeconomics.com/bangladesh"],
            ["Al Jazeera", "https://www.aljazeera.com"],
            ["Financial Times", "https://www.ft.com"],
          ].map(([name, url], i) => (
            <span key={i}>
              {i > 0 && " · "}
              <a href={url} target="_blank" rel="noreferrer">{name}</a>
            </span>
          ))}
        </div>
        <div>THE BRIEF · Bangladesh · {new Date().getFullYear()}</div>
      </footer>

      {showSubscribe && (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) closeModal(); }}>
          <div className="modal-card">
            <button className="modal-close" onClick={closeModal}>×</button>
            {subSubmitted ? (
              <div style={{ textAlign: "center", padding: "16px 0 8px" }}>
                <div style={{ fontSize: 32, color: "var(--bull)", marginBottom: 10 }}>✓</div>
                <div className="modal-title">You're on the list</div>
                <div className="modal-sub" style={{ marginTop: 6, marginBottom: 0 }}>
                  We'll send THE BRIEF to {subEmail} every morning.
                </div>
              </div>
            ) : (
              <>
                <div className="modal-title">Subscribe to THE BRIEF</div>
                <div className="modal-sub">Daily Bangladesh business intelligence, delivered to your inbox.</div>
                <form onSubmit={handleSubscribe}>
                  <div className="form-group">
                    <label className="form-label">Name <span className="req">*</span></label>
                    <input className="form-input" type="text" placeholder="Your name"
                      value={subName} onChange={e => setSubName(e.target.value)} autoFocus />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Organisation</label>
                    <input className="form-input" type="text" placeholder="Company / institution (optional)"
                      value={subOrg} onChange={e => setSubOrg(e.target.value)} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Email Address <span className="req">*</span></label>
                    <input className="form-input" type="email" placeholder="you@example.com"
                      value={subEmail} onChange={e => setSubEmail(e.target.value)} />
                  </div>
                  <button className="submit-btn" type="submit" disabled={!canSubmit}>
                    {subLoading ? "Sending…" : "Subscribe →"}
                  </button>
                  {subError && (
                    <div style={{ color: "var(--bear)", fontSize: 10, letterSpacing: "0.05em", marginTop: 8, textAlign: "center" }}>
                      {subError}
                    </div>
                  )}
                </form>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
